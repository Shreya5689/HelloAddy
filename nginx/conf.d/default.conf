# Standard Upstream Definitions matching Docker container names
upstream backend_service {
    server backend:8000;
}

upstream frontend_service {
    server frontend:80;
}

# 1. HTTP Server - Port 80
# Handles Certbot verification & redirects all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name domainname.com www.domainname.com api.domainname.com;

    # ACME-challenge location for Certbot / Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server - API Domain (api.domainname.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.domainname.com;

    # SSL Certificates (managed by Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/domainname.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domainname.com/privkey.pem;

    # Recommended SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Client payload size limit (adjust if API accepts file uploads)
    client_max_body_size 50M;

    location / {
        proxy_pass http://backend_service;
        
        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# 3. HTTPS Server - Frontend Web Domain (domainname.com & www.domainname.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name domainname.com www.domainname.com;

    # SSL Certificates (managed by Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/domainname.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domainname.com/privkey.pem;

    # Recommended SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://frontend_service;

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
