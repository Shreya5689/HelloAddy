services:
  # Ingress Reverse Proxy - ONLY container exposing public host ports 80 & 443
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # Frontend Web Application (React + Vite static Nginx server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    restart: always
    # Note: No public host ports published. Reachable only via internal Nginx proxy at http://frontend:80
    networks:
      - app-network

  # Backend API Service (FastAPI / Python)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    restart: always
    # Note: No public host ports published. Reachable only via internal Nginx proxy at http://backend:8000
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network

  # Database Service (PostgreSQL)
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    # Note: No public host ports published. Accessible only internally by backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-studymate_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  certbot_webroot:
